
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>About — SujinHan</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Coustard:wght@400;900&display=swap" rel="stylesheet"/>
  <style>
    .about-wrap {
      display: flex;
      gap: 100px;
      align-items: flex-start;
      padding: 0 80px;
      justify-content: center;
      padding-top: 40px;
    }

    /* 왼쪽 프로필 */
    .about-left {
      flex-shrink: 0;
      width: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .about-profile-img {
      width: 180px;
      height: 210px;
      object-fit: cover;
      display: block;
      margin-bottom: 20px;
    }
    .about-name-en {
      font-family: 'Coustard', serif;
      font-size: 1.7rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #E8EAF0;
      margin-bottom: 6px;
      white-space: nowrap;
    }
    .about-name-kr {
      font-family: 'Coustard', serif;
      font-size: 1.3rem;
      font-weight: 400;
      color: #E8EAF0;
      margin-bottom: 4px;
    }
    .about-birth {
      font-family: 'Coustard', serif;
      font-size: 1.1rem;
      color: #6B7280;
    }

    /* 오른쪽 정보 */
    .about-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 38px;
      max-width: 620px;
    }

    /* 각 섹션 행 */
    .about-section {
      display: flex;
      gap: 50px;
      align-items: flex-start;
    }
    .about-label {
      font-family: 'Coustard', serif;
      font-size: 1.15rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      color: #E8EAF0;
      text-transform: uppercase;
      width: 160px;
      flex-shrink: 0;
      padding-top: 2px;
    }
    .about-content {
      flex: 1;
      font-family: 'Coustard', serif;
      font-size: 1.2rem;
      color: #9CA3AF;
      line-height: 1.9;
      white-space: nowrap;
    }
    .about-content a {
      color: #9CA3AF;
      text-decoration: none;
    }
    .about-content a:hover { color: #E8EAF0; }

    /* 스킬 로고 이미지 */
    .skill-logo {
      max-width: 320px;
      height: auto;
      display: block;
    }

    @media (max-width: 768px) {
      .about-wrap {
        flex-direction: column;
        align-items: center;
        padding: 0 20px;
        gap: 40px;
      }
      .about-left {
        width: 100%;
      }
      .about-right {
        width: 100%;
        max-width: 100%;
      }
      .about-content {
        white-space: normal;
        font-size: 0.9rem;
      }
      .about-label {
        width: 100px;
        font-size: 0.9rem;
      }
      .skill-logo {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-links">
      <a href="index.html" class="nav-btn">Home</a>
      <a href="about.html" class="nav-btn active">About</a>
    </div>
  </nav>

  <main class="main">
    <div class="about-wrap">

      <!-- 왼쪽: 프로필 이미지 + 이름 -->
      <div class="about-left">
        <img src="profile.jpg" alt="SuJin Han" class="about-profile-img" onerror="this.style.background='#1E2340'"/>
        <p class="about-name-en">Sujin Han</p>
        <p class="about-name-kr">한수진</p>
        <p class="about-birth">(1999. 9.)</p>
      </div>

      <!-- 오른쪽: 상세 정보 -->
      <div class="about-right">

        <div class="about-section">
          <span class="about-label">Contact</span>
          <div class="about-content">
            E-mail. <a href="mailto:susujin3535@gmail.com" style="color:#ffffff;">susujin3535@gmail.com</a>
          </div>
        </div>

        <div class="about-section">
          <span class="about-label">Skills</span>
          <div class="about-content">
            <img src="logo.png" alt="Skills" class="skill-logo"/>
          </div>
        </div>

        <div class="about-section">
          <span class="about-label">Education</span>
          <div class="about-content">
            2018. 3 ~ 2023. 8<br/>
            &nbsp;&nbsp;Sungkonghoe University (major : Digital Contents)<br/>
            &nbsp;&nbsp;성공회대학교 (전공 : 미디어콘텐츠융합자율학부 디지털콘텐츠)
          </div>
        </div>

        <div class="about-section">
          <span class="about-label">Work</span>
          <div class="about-content">
            2024. 3 ~ 2025. 5<br/>
            &nbsp;&nbsp;사단법인 대한의학회 경영지원팀
          </div>
        </div>

      </div>
    </div>
  </main>

  <footer class="footer">
    <p>© SujinHan. All Rights Reserved.</p>
  </footer>

</body>
</html>
