<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sci-Fi Environment — SujinHan</title>
  <link rel="stylesheet" href="../../style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <span class="nav-name">Han Sujin</span>
    <div class="nav-links">
      <a href="../../index.html" class="nav-btn">Home</a>
      <a href="../../about.html" class="nav-btn">About</a>
    </div>
  </nav>

  <main class="main">

    <!-- 뒤로가기 + 제목 -->
    <section class="page-title works-title">
      <a href="../../index.html" class="back-btn">← Back</a>
      <h1>Sci-Fi Environment</h1>
      <p class="subtitle">3D Background Modeling</p>
    </section>

    <!-- 이미지 그리드 -->
    <section class="works-grid">

      <!-- 이미지 추가 방법:
           <div class="work-item">
             <img src="파일명.jpg" alt="작품 설명"/>
             <p class="work-caption">작품 제목</p>
           </div>
      -->

      <div class="work-item">
        <img src="work1.jpg" alt="Sci-Fi Work 1" onerror="this.parentElement.style.background='#1a1d2e'"/>
        <p class="work-caption">Work Title 1</p>
      </div>

      <div class="work-item">
        <img src="work2.jpg" alt="Sci-Fi Work 2" onerror="this.parentElement.style.background='#1a1d2e'"/>
        <p class="work-caption">Work Title 2</p>
      </div>

      <div class="work-item">
        <img src="work3.jpg" alt="Sci-Fi Work 3" onerror="this.parentElement.style.background='#1a1d2e'"/>
        <p class="work-caption">Work Title 3</p>
      </div>

      <!-- 이미지를 계속 추가하세요 -->

    </section>

    <!-- 라이트박스 (클릭 시 이미지 확대) -->
    <div class="lightbox" id="lightbox">
      <button class="lightbox-close" onclick="closeLightbox()">✕</button>
      <img id="lightbox-img" src="" alt=""/>
    </div>

  </main>

  <footer class="footer">
    <p>© 2026 Han Sujin. All rights reserved.</p>
  </footer>

  <script>
    // 이미지 클릭 시 라이트박스 오픈
    document.querySelectorAll('.work-item img').forEach(img => {
      img.addEventListener('click', () => {
        document.getElementById('lightbox-img').src = img.src;
        document.getElementById('lightbox').classList.add('open');
      });
    });

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
    }

    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeLightbox();
    });
  </script>

</body>
</html>
