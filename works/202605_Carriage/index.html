<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carriage — SujinHan</title>
  <link rel="stylesheet" href="../../style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Coustard:wght@400;900&display=swap" rel="stylesheet"/>
  <style>
    .main { padding-left: 200px !important; padding-right: 200px !important; max-width: 100% !important; }
    .tools-text {
      margin-top: 12px;
      font-family: 'Coustard', serif;
      font-size: 1.2rem;
      margin-bottom: 50px;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: #6B7280;
    }
    .scroll-btns {
      position: fixed;
      left: calc(200px - 80px);
      bottom: 60px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 50;
    }
    .scroll-btn {
      width: 40px;
      height: 40px;
      background: none;
      border: 1px solid #696c64;
      border-radius: 50%;
      color: #6B7280;
      font-size: 1rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .scroll-btn:hover { color: #E8EAF0; border-color: #E8EAF0; }
    .works-list { display: flex; flex-direction: column; gap: 5px; }
    .works-list .work-item { width: 100%; cursor: zoom-in; }
    .works-list .work-item img { width: 100%; height: auto; display: block; }

    /* 라이트박스 좌우 버튼 */
    .lb-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 40px;
      height: 40px;
      background: none;
      border: 1px solid #696c64;
      border-radius: 50%;
      color: #6B7280;
      font-size: 1rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .lb-nav:hover { color: #E8EAF0; border-color: #E8EAF0; }
    .lb-nav-left { left: calc((200px - 40px) / 2); }
    .lb-nav-right { right: calc((200px - 40px) / 2); }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-links">
      <a href="../../index.html" class="nav-btn">Home</a>
      <a href="../../about.html" class="nav-btn">About</a>
    </div>
  </nav>
  <main class="main">
    <section class="page-title works-title">
      <a href="../../index.html" class="back-btn">← Back</a>
      <h1>Carriage</h1>
      <p class="subtitle">2026.05</p>
      <p class="tools-text">3Ds Max · Zbrush · Rizom UV · Marmoset · Substance Painter · Unreal Engine</p>
    </section>

    <div class="scroll-btns">
      <button class="scroll-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">∧</button>
      <button class="scroll-btn" onclick="window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'})">∨</button>
    </div>

    <section class="works-list" id="works-list"></section>

    <div class="lightbox" id="lightbox">
      <button class="lightbox-close" onclick="closeLightbox()">✕</button>
      <div class="lb-toast" id="lb-toast">Scroll to zoom · Drag to pan</div>

      <!-- 좌우 이미지 이동 버튼 -->
      <button class="lb-nav lb-nav-left" onclick="prevImage()">＜</button>
      <button class="lb-nav lb-nav-right" onclick="nextImage()">＞</button>

      <div class="lightbox-controls">
        <button class="lb-btn" onclick="zoom(-0.2)">－</button>
        <span class="zoom-label" id="zoom-label">100%</span>
        <button class="lb-btn" onclick="zoom(0.2)">＋</button>
        <button class="lb-btn" onclick="resetZoom()">↺</button>
      </div>
      <div class="lightbox-img-wrap" id="lb-wrap">
        <img id="lightbox-img" src="" alt="" onclick="event.stopPropagation()"/>
      </div>
    </div>
  </main>
  <footer class="footer">
    <p>© 2026 Han Sujin. All rights reserved.</p>
  </footer>
  <script>
    const imageSrcs = ['work1.jpg','work2.jpg','work3.jpg','work4.jpg','work5.jpg',
                       'work6.jpg','work7.jpg','work8.jpg','work9.jpg','work10.jpg',
                       'work11.jpg','work12.jpg','work13.jpg','work14.jpg','work15.jpg'];
    const loadedSrcs = [];
    const list = document.getElementById('works-list');

    // 순서 보장: 먼저 순서대로 자리 잡고 로드되면 채움
    imageSrcs.forEach((src, idx) => {
      const div = document.createElement('div');
      div.className = 'work-item';
      div.style.display = 'none';
      const i = document.createElement('img');
      i.src = src;
      i.onload = () => {
        div.style.display = 'block';
        loadedSrcs[idx] = src; // 인덱스 순서 유지
        i.addEventListener('click', () => openLightbox(idx));
      };
      i.onerror = () => { div.remove(); };
      div.appendChild(i);
      list.appendChild(div);
    });

    let currentIndex = 0;
    let currentScale = 1, translateX = 0, translateY = 0, isDragging = false, startX, startY;

    function openLightbox(idx) {
      currentIndex = idx;
      document.getElementById('lightbox-img').src = loadedSrcs[currentIndex];
      currentScale = 1; translateX = 0; translateY = 0;
      applyTransform();
      document.getElementById('lightbox').classList.add('open');
      showToast();
    }

    function prevImage() {
      const validSrcs = loadedSrcs.filter(Boolean);
      if (validSrcs.length === 0) return;
      do { currentIndex = (currentIndex - 1 + loadedSrcs.length) % loadedSrcs.length; }
      while (!loadedSrcs[currentIndex]);
      document.getElementById('lightbox-img').src = loadedSrcs[currentIndex];
      currentScale = 1; translateX = 0; translateY = 0;
      applyTransform();
    }

    function nextImage() {
      const validSrcs = loadedSrcs.filter(Boolean);
      if (validSrcs.length === 0) return;
      do { currentIndex = (currentIndex + 1) % loadedSrcs.length; }
      while (!loadedSrcs[currentIndex]);
      document.getElementById('lightbox-img').src = loadedSrcs[currentIndex];
      currentScale = 1; translateX = 0; translateY = 0;
      applyTransform();
    }

    function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
    function zoom(delta) { currentScale = Math.min(Math.max(currentScale + delta, 0.4), 3); applyTransform(); }
    function resetZoom() { currentScale = 1; translateX = 0; translateY = 0; applyTransform(); }
    function applyTransform() {
      const img = document.getElementById('lightbox-img');
      img.style.transform = 'scale(' + currentScale + ') translate(' + (translateX / currentScale) + 'px, ' + (translateY / currentScale) + 'px)';
      document.getElementById('zoom-label').textContent = Math.round(currentScale * 100) + '%';
      document.getElementById('lb-wrap').style.cursor = currentScale > 1 ? (isDragging ? 'grabbing' : 'grab') : 'default';
    }

    document.getElementById('lb-wrap').addEventListener('wheel', (e) => { e.preventDefault(); zoom(e.deltaY < 0 ? 0.1 : -0.1); }, { passive: false });
    const wrap = document.getElementById('lb-wrap');
    wrap.addEventListener('mousedown', (e) => { if (currentScale <= 1) return; isDragging = true; startX = e.clientX - translateX; startY = e.clientY - translateY; e.preventDefault(); });
    window.addEventListener('mousemove', (e) => { if (!isDragging) return; translateX = e.clientX - startX; translateY = e.clientY - startY; applyTransform(); });
    window.addEventListener('mouseup', () => { if (!isDragging) return; isDragging = false; applyTransform(); });

    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (!e.target.closest('.lightbox-img-wrap') && !e.target.closest('.lightbox-controls') && !e.target.closest('.lightbox-close') && !e.target.closest('.lb-nav')) closeLightbox();
    });

    function showToast() {
      const t = document.getElementById('lb-toast');
      t.classList.remove('hide');
      setTimeout(() => t.classList.add('hide'), 3000);
    }
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') nextImage();
      if (e.key === 'ArrowLeft') prevImage();
    });
  </script>
</body>
</html>
