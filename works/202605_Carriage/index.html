
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carriage — SujinHan</title>
  <link rel="stylesheet" href="../../style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Coustard:wght@400;900&display=swap" rel="stylesheet"/>
  <style>
    .main { padding-left: 200px !important; padding-right: 200px !important; max-width: 100% !important; padding-top: 100px !important; }
    .page-title { padding-bottom: 10px !important; margin-left: -10px; }
    @media (max-width: 768px) { .main { padding-left: 16px !important; padding-right: 16px !important; } .scroll-btns { left: 4px; } }
    .tools-text { margin-top: 12px; font-family: 'Coustard', serif; font-size: 1.2rem; margin-bottom: 8px; font-weight: 400; letter-spacing: 0.1em; color: #6B7280; margin-left: 5px; }
    .work-icon { display: block; max-width: 25%; height: auto; margin-bottom: 10px; margin-left: 5px; }
    .fixed-info {
      position: fixed;
      left: 48px;
      bottom: 48px;
      z-index: 50;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    .fixed-info.visible { opacity: 1; }
    .fixed-title {
      font-family: 'Coustard', serif;
      font-size: 2.3rem;
      font-weight: 400;
      color: #E8EAF0;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .fixed-date {
      font-family: 'Coustard', serif;
      font-size: 0.9rem;
      font-weight: 400;
      color: #6B7280;
      letter-spacing: 0.1em;
      margin-bottom: 2px;
      padding-left: 10px;
    }
    .fixed-tools {
      font-family: 'Coustard', serif;
      font-size: 1.0rem;
      font-weight: 400;
      color: #ffffff;
      letter-spacing: 0.08em;
      padding-left: 10px;
    }
    .works-list { display: flex; flex-direction: column; gap: 20px; }
    .works-list .work-item { width: 100%; cursor: zoom-in; }
    .works-list .work-item img { width: 100%; height: auto; display: block; }

    /* 라이트박스 */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(5,6,12,0.97);
      z-index: 999;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
    }
    .lightbox.open { display: flex; }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 28px;
      background: none;
      border: none;
      color: #6B7280;
      font-size: 1.5rem;
      cursor: pointer;
      z-index: 10;
      transition: color 0.2s;
    }
    .lightbox-close:hover { color: #E8EAF0; }

    /* 메인 이미지 영역 */
    .lb-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 100px 0;
      cursor: zoom-in;
      overflow: hidden;
    }
    .lb-main img {
      max-width: 90vw;
      max-height: calc(100vh - 200px - 120px);
      object-fit: contain;
      display: block;
      transform-origin: center center;
      transition: transform 0.2s ease;
    }

    /* 도구모음 */
    .lightbox-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(105,108,100,0.6);
      border: 1px solid #696c64;
      border-radius: 4px;
      padding: 6px 13px;
      margin-bottom: 50px;
      flex-shrink: 0;
      transition: position 0.2s;
    }
    .lightbox.zoomed .lightbox-controls {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      margin-bottom: 0;
      z-index: 10;
    }
    .lb-btn { background: none; border: none; color: #ffffff; font-size: 1.1rem; cursor: pointer; padding: 2px 8px; border-radius: 2px; transition: background 0.2s; }
    .lb-btn:hover { background: rgba(78,205,196,0.12); color: #4ECDC4; }
    .zoom-label { font-size: 0.75rem; color: #ffffff; min-width: 40px; text-align: center; font-family: 'Coustard', serif; }

    /* 썸네일 바 */
    .lb-thumbs {
      display: flex;
      gap: 6px;
      padding: 8px 16px;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 100%;
    }
    .lightbox.zoomed .lb-thumbs {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: none;
      z-index: 9;
    }

    .lb-thumb {
      flex-shrink: 0;
      width: 60px;
      height: 60px;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid transparent;
      border-radius: 2px;
      opacity: 0.5;
      transition: opacity 0.2s, border-color 0.2s, transform 0.2s;
    }
    .lb-thumb:hover { opacity: 0.8; }
    .lb-thumb.active {
      border-color: #ffffff;
      opacity: 1;
      transform: scale(1.15);
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-links">
      <a href="../../index.html" class="nav-btn">Home</a>
      <a href="../../about.html" class="nav-btn">About</a>
    </div>
  </nav>
  <main class="main">
    <section class="page-title works-title">
      <a href="../../index.html" class="back-btn">← Back</a>
      <h1 style="margin-left: -15px;">Carriage</h1>
      <p class="subtitle" style="margin-left: -5px;">2026.05</p>
      <p class="tools-text" style="padding-left: 40px;">3Ds Max · Zbrush · Rizom UV · Marmoset · Substance Painter · Unreal Engine</p>
      <img src="carriage-icon.png" alt="Carriage icons" class="work-icon" style="margin-left: 40px; max-width: 25%; margin-bottom: 16px;" onerror="this.style.display='none'"/>
      <p class="subtitle" style="margin-left: -5px; margin-bottom: 60px; text-transform: none; font-size: 0.8rem;">background : <a href="https://fab.com/s/0554e320be34" target="_blank" style="color:inherit; text-decoration:underline;">https://fab.com/s/0554e320be34</a></p>
    </section>

    <!-- 고정 텍스트 -->
    <div class="fixed-info" id="fixed-info">
      <p class="fixed-title">Carriage</p>
      <p class="fixed-date">2026.05</p>
      <p class="fixed-tools">3Ds Max · Zbrush · Rizom UV · Marmoset · Substance Painter · Unreal Engine</p>
    </div>

    <section class="works-list" id="works-list"></section>

    <!-- 라이트박스 -->
    <div class="lightbox" id="lightbox">
      <button class="lightbox-close" onclick="closeLightbox()">✕</button>

      <!-- 메인 이미지 -->
      <div class="lb-main" id="lb-main" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt=""/>
      </div>

      <!-- 도구모음 -->
      <div class="lightbox-controls">
        <button class="lb-btn" onclick="zoom(-0.2); event.stopPropagation()">－</button>
        <span class="zoom-label" id="zoom-label">100%</span>
        <button class="lb-btn" onclick="zoom(0.2); event.stopPropagation()">＋</button>
        <button class="lb-btn" onclick="resetZoom(); event.stopPropagation()">↺</button>
      </div>

      <!-- 썸네일 바 -->
      <div class="lb-thumbs" id="lb-thumbs"></div>
    </div>
  </main>
  <footer class="footer">
    <p>© SujinHan. All Rights Reserved.</p>
  </footer>
  <script>
    const imageSrcs = ['work1.jpg','work2.jpg','work3.jpg','work4.jpg','work5.jpg',
                       'work6.jpg','work7.jpg','work8.jpg','work9.jpg','work10.jpg',
                       'work11.jpg','work12.jpg','work13.jpg','work14.jpg','work15.jpg'];
    const loadedSrcs = [];
    const list = document.getElementById('works-list');
    const thumbBar = document.getElementById('lb-thumbs');

    imageSrcs.forEach((src, idx) => {
      const div = document.createElement('div');
      div.className = 'work-item';
      div.style.display = 'none';
      const i = document.createElement('img');
      i.src = src;
      i.onload = () => {
        div.style.display = 'block';
        loadedSrcs[idx] = src;
        i.addEventListener('click', () => openLightbox(idx));

        // 썸네일 순서 고정 (idx 순서대로)
        const thumb = document.createElement('img');
        thumb.src = src;
        thumb.className = 'lb-thumb';
        thumb.dataset.idx = idx;
        thumb.addEventListener('click', (e) => { e.stopPropagation(); selectImage(idx); });
        // idx 순서대로 삽입
        const thumbs = thumbBar.querySelectorAll('.lb-thumb');
        let inserted = false;
        for (let t of thumbs) {
          if (parseInt(t.dataset.idx) > idx) {
            thumbBar.insertBefore(thumb, t);
            inserted = true;
            break;
          }
        }
        if (!inserted) thumbBar.appendChild(thumb);
      };
      i.onerror = () => { div.remove(); };
      div.appendChild(i);
      list.appendChild(div);
    });

    let currentIndex = 0;
    let currentScale = 1.3;

    function openLightbox(idx) {
      selectImage(idx);
      document.getElementById('lightbox').classList.add('open');
    }    function selectImage(idx) {
      currentIndex = idx;
      document.getElementById('lightbox-img').src = loadedSrcs[idx];
      resetZoom();
      updateThumbs();
    }

    function updateThumbs() {
      const validIdxs = loadedSrcs.map((s,i) => s ? i : -1).filter(i => i >= 0);
      const total = validIdxs.length;
      if (total === 0) return;

      const pos = validIdxs.indexOf(currentIndex);
      const visible = 9; // 보여줄 썸네일 수 (홀수)
      const half = Math.floor(visible / 2);

      thumbBar.innerHTML = '';
      for (let i = -half; i <= half; i++) {
        const realPos = ((pos + i) % total + total) % total;
        const realIdx = validIdxs[realPos];
        const thumb = document.createElement('img');
        thumb.src = loadedSrcs[realIdx];
        thumb.className = 'lb-thumb' + (i === 0 ? ' active' : '');
        thumb.addEventListener('click', (e) => {
          e.stopPropagation();
          selectImage(realIdx);
        });
        thumbBar.appendChild(thumb);
      }
    }

    let clickCount = 0;

    function handleMainClick() {
      if (clickCount === 0) {
        currentScale = 1.95;
        clickCount = 1;
        applyZoom();
      }
      // 이미 확대된 상태에서 클릭 → 아무 효과 없음
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      resetZoom();
    }

    function zoom(delta) {
      currentScale = Math.min(Math.max(currentScale + delta, 0.4), 3);
      applyZoom();
    }

    function resetZoom() {
      currentScale = 1.3;
      translateX = 0;
      translateY = 0;
      clickCount = 0;
      applyZoom();
    }

    function applyZoom() {
      lbImg.style.transform = `scale(${currentScale}) translate(${translateX / currentScale}px, ${translateY / currentScale}px)`;
      document.getElementById('zoom-label').textContent = Math.round((currentScale / 1.3) * 100) + '%';
      lbMain.style.cursor = currentScale >= 2.6 ? 'zoom-out' : (isDragging ? 'grabbing' : 'zoom-in');
      document.getElementById('lightbox').classList.toggle('zoomed', currentScale > 1.3);
    }

    // 스크롤 줌인/줌아웃
    document.getElementById('lb-main').addEventListener('wheel', (e) => {
      e.preventDefault();
      zoom(e.deltaY < 0 ? 0.1 : -0.1);
    }, { passive: false });

    // 드래그로 이동
    let isDragging = false, startX, startY, translateX = 0, translateY = 0;
    const lbMain = document.getElementById('lb-main');
    const lbImg = document.getElementById('lightbox-img');

    lbMain.addEventListener('mousedown', (e) => {
      if (currentScale <= 1.3) return;
      isDragging = true;
      startX = e.clientX - translateX;
      startY = e.clientY - translateY;
      lbMain.style.cursor = 'grabbing';
      e.preventDefault();
    });
    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      translateX = e.clientX - startX;
      translateY = e.clientY - startY;
      applyZoom();
    });
    window.addEventListener('mouseup', () => {
      if (!isDragging) return;
      isDragging = false;
      lbMain.style.cursor = currentScale >= 2.6 ? 'zoom-out' : 'zoom-in';
    });

    // 이미지 외 여백 클릭시 닫기
    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (!e.target.closest('.lb-main') && !e.target.closest('.lightbox-controls') && !e.target.closest('.lb-thumbs') && !e.target.closest('.lightbox-close')) closeLightbox();
    });

    // 이미지 클릭시만 확대
    document.getElementById('lightbox-img').addEventListener('click', (e) => {
      e.stopPropagation();
      handleMainClick();
    });

    // 600px 스크롤하면 고정 텍스트 표시
    const fixedInfo = document.getElementById('fixed-info');
    window.addEventListener('scroll', () => {
      if (window.scrollY >= 600) {
        fixedInfo.classList.add('visible');
      } else {
        fixedInfo.classList.remove('visible');
      }
    });

    document.addEventListener('keydown', (e) => {
      const valid = loadedSrcs.filter(Boolean);
      const validIdxs = loadedSrcs.map((s,i) => s ? i : -1).filter(i => i >= 0);
      const pos = validIdxs.indexOf(currentIndex);
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') selectImage(validIdxs[(pos + 1) % validIdxs.length]);
      if (e.key === 'ArrowLeft') selectImage(validIdxs[(pos - 1 + validIdxs.length) % validIdxs.length]);
    });
  </script>
</body>
</html>
