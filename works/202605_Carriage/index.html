<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carriage — SujinHan</title>
  <link rel="stylesheet" href="../../style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Coustard:wght@400;900&display=swap" rel="stylesheet"/>
  <style>
    .main { padding-left: 200px !important; padding-right: 200px !important; max-width: 100% !important; }
    @media (max-width: 768px) {
      .main { padding-left: 16px !important; padding-right: 16px !important; }
      .scroll-btns { left: 4px; }
    }
    .tools-text {
      margin-top: 12px;
      font-family: 'Coustard', serif;
      font-size: 1.2rem;
      margin-bottom: 50px;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: #6B7280;
    }
    .scroll-btns {
      position: fixed;
      left: calc(200px - 80px);
      bottom: 60px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 50;
    }
    .scroll-btn {
      width: 40px;
      height: 40px;
      background: none;
      border: 1px solid #696c64;
      border-radius: 50%;
      color: #6B7280;
      font-size: 1rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .scroll-btn:hover { color: #E8EAF0; border-color: #E8EAF0; }
    .works-list { display: flex; flex-direction: column; gap: 5px; }
    .works-list .work-item { width: 100%; cursor: zoom-in; }
    .works-list .work-item img { width: 100%; height: auto; display: block; }

    /* 심플 라이트박스 */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(5,6,12,0.95);
      z-index: 999;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .lightbox.open { display: flex; }
    .lightbox-img-wrap img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      display: block;
    }
    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 28px;
      background: none;
      border: none;
      color: #6B7280;
      font-size: 1.5rem;
      cursor: pointer;
      transition: color 0.2s;
      z-index: 10;
    }
    .lightbox-close:hover { color: #E8EAF0; }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-links">
      <a href="../../index.html" class="nav-btn">Home</a>
      <a href="../../about.html" class="nav-btn">About</a>
    </div>
  </nav>
  <main class="main">
    <section class="page-title works-title">
      <a href="../../index.html" class="back-btn">← Back</a>
      <h1>Carriage</h1>
      <p class="subtitle">2026.05</p>
      <p class="tools-text">3Ds Max · Zbrush · Rizom UV · Marmoset · Substance Painter · Unreal Engine</p>
    </section>

    <div class="scroll-btns">
      <button class="scroll-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">∧</button>
      <button class="scroll-btn" onclick="window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'})">∨</button>
    </div>

    <section class="works-list" id="works-list"></section>

    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
      <button class="lightbox-close" onclick="closeLightbox()">✕</button>
      <div class="lightbox-img-wrap">
        <img id="lightbox-img" src="" alt=""/>
      </div>
    </div>
  </main>
  <footer class="footer">
    <p>© SujinHan. All Rights Reserved.</p>
  </footer>
  <script>
    const imageSrcs = ['work1.jpg','work2.jpg','work3.jpg','work4.jpg','work5.jpg',
                       'work6.jpg','work7.jpg','work8.jpg','work9.jpg','work10.jpg',
                       'work11.jpg','work12.jpg','work13.jpg','work14.jpg','work15.jpg'];
    const list = document.getElementById('works-list');
    imageSrcs.forEach((src, idx) => {
      const div = document.createElement('div');
      div.className = 'work-item';
      div.style.display = 'none';
      const i = document.createElement('img');
      i.src = src;
      i.onload = () => {
        div.style.display = 'block';
        i.addEventListener('click', () => openLightbox(src));
      };
      i.onerror = () => { div.remove(); };
      div.appendChild(i);
      list.appendChild(div);
    });

    function openLightbox(src) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('open');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
    }
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>
</body>
</html>
