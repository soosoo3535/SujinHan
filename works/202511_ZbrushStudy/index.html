<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="../../style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>

    }

</head>
<body>

  <nav class="nav">
    <div class="nav-links">

      <a href="../../about.html" class="nav-btn">About</a>
    </div>
  </nav>

  <main class="main">

    <section class="page-title works-title">
      <a href="../../index.html" class="back-btn">← Back</a>
      <h1>Zbrush Study</h1>
      <p class="subtitle">2025.11 —</p>
    </section>

    <!-- 새 작업물은 맨 위에 추가하세요. 날짜_이름-번호.jpg 형식 유지 -->

      <div class="work-item" onclick="openLightbox(this)"><img src="20260301_rock2-1.jpg" alt="rock2-1"/></div>
      <div class="work-item" onclick="openLightbox(this)"><img src="20260301_rock2-2.jpg" alt="rock2-2"/></div>
      <div class="work-item" onclick="openLightbox(this)"><img src="20260301_rock2-3.jpg" alt="rock2-3"/></div>
      <div class="work-item" onclick="openLightbox(this)"><img src="20260301_rock2-4.jpg" alt="rock2-4"/></div>

      <div class="work-item" onclick="openLightbox(this)"><img src="20260102_rock1-1.jpg" alt="rock1-1"/></div>
      <div class="work-item" onclick="openLightbox(this)"><img src="20260102_rock1-2.jpg" alt="rock1-2"/></div>
      <div class="work-item" onclick="openLightbox(this)"><img src="20260102_rock1-3.jpg" alt="rock1-3"/></div>

      <div class="work-item" onclick="openLightbox(this)"><img src="20260101_pillar1-1.jpg" alt="pillar1-1"/></div>
      <div class="work-item" onclick="openLightbox(this)"><img src="20260101_pillar1-2.jpg" alt="pillar1-2"/></div>

      <div class="work-item" onclick="openLightbox(this)"><img src="20251201_tile2-1.jpg" alt="tile2-1"/></div>
      <div class="work-item" onclick="openLightbox(this)"><img src="20251201_tile2-2.jpg" alt="tile2-2"/></div>
      <div class="work-item" onclick="openLightbox(this)"><img src="20251201_tile2-3.jpg" alt="tile2-3"/></div>

      <div class="work-item" onclick="openLightbox(this)"><img src="20251101_tile1-1.jpg" alt="tile1-1"/></div>
      <div class="work-item" onclick="openLightbox(this)"><img src="20251101_tile1-2.jpg" alt="tile1-2"/></div>
      <div class="work-item" onclick="openLightbox(this)"><img src="20251101_tile1-3.jpg" alt="tile1-3"/></div>

    </section>
  </main>

  <!-- 라이트박스 -->
  <div class="lightbox" id="lightbox" onclick="handleLightboxClick(event)">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <div class="lightbox-controls">
      <button class="lb-btn" onclick="zoom(-0.2)">－</button>
      <span class="zoom-label" id="zoom-label">100%</span>
      <button class="lb-btn" onclick="zoom(0.2)">＋</button>
      <button class="lb-btn" onclick="resetZoom()">↺</button>
    </div>
    <div class="lightbox-img-wrap" id="lb-wrap">
      <img id="lightbox-img" src="" alt=""/>
    </div>
  </div>

  <footer class="footer">
    <p>© 2026 Han Sujin. All rights reserved.</p>
  </footer>

  <script>
    let currentScale = 1;

    function openLightbox(el) {
      const src = el.querySelector('img').src;
      document.getElementById('lightbox-img').src = src;
      currentScale = 1;
      applyZoom();
      document.getElementById('lightbox').classList.add('open');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
    }

    function handleLightboxClick(e) {
      if (e.target === e.currentTarget) closeLightbox();
    }

    function zoom(delta) {
      currentScale = Math.min(Math.max(currentScale + delta, 0.4), 3);
      applyZoom();
    }

    function resetZoom() {
      currentScale = 1;
      applyZoom();
    }

    function applyZoom() {
      const img = document.getElementById('lightbox-img');
      img.style.transform = 'scale(' + currentScale + ')';
      document.getElementById('zoom-label').textContent = Math.round(currentScale * 100) + '%';
    }

    document.getElementById('lb-wrap').addEventListener('wheel', (e) => {
      e.preventDefault();
      zoom(e.deltaY < 0 ? 0.1 : -0.1);
    }, { passive: false });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>

</body>
</html>
