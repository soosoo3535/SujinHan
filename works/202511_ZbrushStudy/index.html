  <!-- 라이트박스 -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <div class="lightbox-controls">
      <button class="lb-btn" onclick="zoom(-0.2)">－</button>
      <span class="zoom-label" id="zoom-label">100%</span>
      <button class="lb-btn" onclick="zoom(0.2)">＋</button>
      <button class="lb-btn" onclick="resetZoom()">↺</button>
    </div>
    <div class="lightbox-img-wrap" id="lb-wrap">
      <img id="lightbox-img" src="" alt="" onclick="event.stopPropagation()"/>
    </div>
  </div>

  <footer class="footer">
    <p>© 2026 Han Sujin. All rights reserved.</p>
  </footer>

  <script>
    let currentScale = 1;
    let translateX = 0;
    let translateY = 0;
    let isDragging = false;
    let startX, startY;

    function openLightbox(el) {
      const src = el.querySelector('img').src;
      document.getElementById('lightbox-img').src = src;
      currentScale = 1;
      translateX = 0;
      translateY = 0;
      applyTransform();
      document.getElementById('lightbox').classList.add('open');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
    }

    function handleLightboxClick(e) {}

    function zoom(delta) {
      currentScale = Math.min(Math.max(currentScale + delta, 0.4), 3);
      applyTransform();
    }

    function resetZoom() {
      currentScale = 1;
      translateX = 0;
      translateY = 0;
      applyTransform();
    }

    function applyTransform() {
      const img = document.getElementById('lightbox-img');
      img.style.transform = `scale(${currentScale}) translate(${translateX / currentScale}px, ${translateY / currentScale}px)`;
      document.getElementById('zoom-label').textContent = Math.round(currentScale * 100) + '%';
      // 확대 상태면 grab 커서, 아니면 기본
      const wrap = document.getElementById('lb-wrap');
      wrap.style.cursor = currentScale > 1 ? (isDragging ? 'grabbing' : 'grab') : 'default';
    }

    // 휠 확대/축소
    document.getElementById('lb-wrap').addEventListener('wheel', (e) => {
      e.preventDefault();
      zoom(e.deltaY < 0 ? 0.1 : -0.1);
    }, { passive: false });

    // 드래그로 이동
    const wrap = document.getElementById('lb-wrap');

    wrap.addEventListener('mousedown', (e) => {
      if (currentScale <= 1) return;
      isDragging = true;
      startX = e.clientX - translateX;
      startY = e.clientY - translateY;
      wrap.style.cursor = 'grabbing';
      e.preventDefault();
    });

    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      translateX = e.clientX - startX;
      translateY = e.clientY - startY;
      applyTransform();
    });

    window.addEventListener('mouseup', () => {
      if (!isDragging) return;
      isDragging = false;
      applyTransform();
    });

    // 라이트박스 외부 어디든 클릭하면 닫기
    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (!e.target.closest('.lightbox-img-wrap') && !e.target.closest('.lightbox-controls') && !e.target.closest('.lightbox-close')) {
        closeLightbox();
      }
    });

    // ESC 닫기
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>
