<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Substance Designer — SujinHan</title>
  <link rel="stylesheet" href="../../style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Coustard:wght@400;900&display=swap" rel="stylesheet"/>
  <style>
    .main { padding-left: 200px !important; padding-right: 200px !important; max-width: 100% !important; padding-top: 100px !important; }
    .page-title { padding-bottom: 10px !important; margin-left: -10px; }
    @media (max-width: 768px) { .main { padding-left: 16px !important; padding-right: 16px !important; } }
    .tools-text { margin-top: 12px; font-family: 'Coustard', serif; font-size: 1.2rem; margin-bottom: 8px; font-weight: 400; letter-spacing: 0.1em; color: #6B7280; margin-left: 5px; }
    .work-icon { display: block; max-width: 25%; height: auto; margin-bottom: 10px; margin-left: 5px; }
    .fixed-info {
      position: fixed;
      left: 48px;
      bottom: 48px;
      z-index: 50;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    .fixed-info.visible { opacity: 1; }
    .fixed-title {
      font-family: 'Coustard', serif;
      font-size: 2.3rem;
      font-weight: 400;
      color: #E8EAF0;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .fixed-date {
      font-family: 'Coustard', serif;
      font-size: 0.9rem;
      font-weight: 400;
      color: #6B7280;
      letter-spacing: 0.1em;
      margin-bottom: 2px;
      padding-left: 10px;
    }
    .fixed-tools {
      font-family: 'Coustard', serif;
      font-size: 1.0rem;
      font-weight: 400;
      color: #ffffff;
      letter-spacing: 0.08em;
      padding-left: 10px;
    }

    /* 인라인 갤러리: 이미지(좌) + 세로 썸네일바(우) */
    .inline-gallery { display: flex; flex-direction: row; align-items: stretch; justify-content: center; gap: 16px; margin-top: 10px; }

    .gallery-main {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: zoom-in;
      overflow: hidden;
      max-width: calc(100% - 86px);
    }
    .gallery-main img {
      max-width: 100%;
      max-height: 82vh;
      object-fit: contain;
      display: block;
      transform-origin: center center;
      transition: transform 0.2s ease;
    }

    /* 도구모음: 이미지 위에 레이어로 겹쳐서 표시 */
    .gallery-controls {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(105,108,100,0.6);
      border: 1px solid #696c64;
      border-radius: 4px;
      padding: 6px 13px;
    }
    .lb-btn { background: none; border: none; color: #ffffff; font-size: 1.1rem; cursor: pointer; padding: 2px 8px; border-radius: 2px; transition: background 0.2s; }
    .lb-btn:hover { background: rgba(78,205,196,0.12); color: #4ECDC4; }
    .zoom-label { font-size: 0.75rem; color: #ffffff; min-width: 40px; text-align: center; font-family: 'Coustard', serif; }

    /* 세로 썸네일바 (현재 이미지가 중앙, 위=이전 / 아래=다음, 무한순환) */
    .gallery-thumbs {
      width: 70px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
      justify-content: center;
    }
    .lb-thumb {
      flex-shrink: 0;
      width: 60px;
      height: 60px;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid transparent;
      border-radius: 2px;
      opacity: 0.5;
      transition: opacity 0.2s, border-color 0.2s, transform 0.2s;
    }
    .lb-thumb:hover { opacity: 0.8; }
    .lb-thumb.active {
      border-color: #ffffff;
      opacity: 1;
      transform: scale(1.15);
    }
    /* 좌우 카테고리 이동 버튼 */
    .page-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 40;
      background: none;
      border: none;
      color: rgba(255,255,255,0.3);
      font-size: 3rem;
      cursor: pointer;
      padding: 18px 24px;
      transition: color 0.2s;
      font-family: 'Coustard', serif;
    }
    .page-nav:hover { color: rgba(255,255,255,0.9); }
    .page-nav-prev { left: 18px; }
    .page-nav-next { right: 18px; }
  </style>
</head>
<body>
  <button class="page-nav page-nav-prev" onclick="location.href='../202311_Tavern/index.html'">‹</button>
  <button class="page-nav page-nav-next" onclick="location.href='../202606_Sanctuary/index.html'">›</button>
  <nav class="nav">
    <div class="nav-links">
      <a href="../../index.html" class="nav-btn">Home</a>
      <a href="../../about.html" class="nav-btn">About</a>
    </div>
  </nav>
  <main class="main">
    <section class="page-title works-title">
      <a href="../../index.html" class="back-btn">← Back</a>
      <h1 style="max-width: 800px; margin: 0 auto; padding-left: 0; text-align: center; font-size: 2.6rem;">Substance Designer</h1>
      <p class="subtitle" style="max-width: 800px; margin: 0 auto 12px auto; padding-left: 0; text-align: center; font-size: 0.9rem;">2023.12~</p>
      <img src="substance-icon.png" alt="Substance Designer icons" class="work-icon" style="margin: 0 auto 1px auto; height: 55px; width: auto; max-width: none;" onerror="this.style.display='none'"/>
      <p class="tools-text" style="text-align: center; font-size: 0.9rem; margin-top: 0; margin-bottom: 50px;">Substance Designer · Marmoset</p>
    </section>

    <!-- 고정 텍스트 -->
    <div class="fixed-info" id="fixed-info">
      <p class="fixed-title">Substance Designer</p>
      <p class="fixed-date">2023.12</p>
      <p class="fixed-tools">Substance Designer · Marmoset</p>
    </div>

    <!-- 인라인 갤러리: 메인 이미지(확대/드래그) + 도구모음 + 썸네일바 -->
    <section class="inline-gallery" id="inline-gallery">
      <div class="gallery-main" id="gallery-main">
        <img id="gallery-img" src="" alt=""/>
        <div class="gallery-controls">
          <button class="lb-btn" tabindex="-1" onclick="zoom(-0.2); event.stopPropagation()">－</button>
          <span class="zoom-label" id="zoom-label">100%</span>
          <button class="lb-btn" onclick="zoom(0.2); event.stopPropagation()">＋</button>
          <button class="lb-btn" onclick="resetZoom(); event.stopPropagation()">↺</button>
        </div>
      </div>

      <div class="gallery-thumbs" id="gallery-thumbs"></div>
    </section>
  </main>
  <footer class="footer">
    <p>© SujinHan. All Rights Reserved.</p>
  </footer>
  <script>
    // ── 변수 선언 (모두 맨 위에) ──────────────────────────────
    const imageSrcs = [
      '2024.01_work5.jpg',
      '2024.01_work4.jpg',
      '2024.01_work3.jpg',
      '2023.12_work2.jpg',
      '2023.12_work1.jpg'
    ];
    const loadedSrcs = [];
    let pendingCount = imageSrcs.length;
    let currentIndex = 0;
    let currentScale = 1.0;
    let clickCount = 0;
    let isDragging = false, dragMoved = false;
    let startX = 0, startY = 0, translateX = 0, translateY = 0;

    const galleryImg = document.getElementById('gallery-img');
    const galleryMain = document.getElementById('gallery-main');
    const galleryThumbs = document.getElementById('gallery-thumbs');
    const fixedInfo = document.getElementById('fixed-info');

    // ── 이미지 로딩 ──────────────────────────────────────────
    imageSrcs.forEach((src, idx) => {
      const probe = new Image();
      probe.onload = () => { loadedSrcs[idx] = src; settle(); };
      probe.onerror = () => { settle(); };
      probe.src = src;
    });

    function settle() {
      pendingCount--;
      if (pendingCount === 0) {
        const validIdxs = loadedSrcs.map((s, i) => s ? i : -1).filter(i => i >= 0);
        if (validIdxs.length === 0) return;
        const params = new URLSearchParams(window.location.search);
        const requestedFile = params.get('img');
        const requestedIdx = requestedFile ? imageSrcs.indexOf(requestedFile) : -1;
        if (requestedIdx >= 0 && loadedSrcs[requestedIdx]) {
          selectImage(requestedIdx);
        } else {
          selectImage(validIdxs[0]);
        }
      }
    }

    // ── 갤러리 함수 ──────────────────────────────────────────
    function selectImage(idx) {
      currentIndex = idx;
      galleryImg.src = loadedSrcs[idx];
      const dateMatch = imageSrcs[idx].match(/^(\d{4}\.\d{2})/);
      if (dateMatch) {
        document.getElementById('fixed-date').textContent = dateMatch[1];
      }
      resetZoom();
      updateThumbs();
    }

    function updateThumbs() {
      const validIdxs = loadedSrcs.map((s,i) => s ? i : -1).filter(i => i >= 0);
      if (validIdxs.length === 0) return;
      galleryThumbs.innerHTML = '';
      validIdxs.forEach(realIdx => {
        const thumb = document.createElement('img');
        thumb.src = loadedSrcs[realIdx];
        thumb.className = 'lb-thumb' + (realIdx === currentIndex ? ' active' : '');
        thumb.addEventListener('click', () => selectImage(realIdx));
        galleryThumbs.appendChild(thumb);
      });
    }

    function handleMainClick() {
      const steps = [1.0, 1.5, 2.0, 3.0];
      const nextStep = (steps.indexOf(currentScale) + 1) % steps.length;
      currentScale = steps[nextStep];
      if (currentScale === 1.0) { translateX = 0; translateY = 0; }
      clickCount = currentScale === 1.0 ? 0 : 1;
      applyZoom();
    }

    function zoom(delta) {
      currentScale = Math.min(Math.max(currentScale + delta, 0.4), 3);
      applyZoom();
    }

    function resetZoom() {
      currentScale = 1.0;
      translateX = 0;
      translateY = 0;
      clickCount = 0;
      applyZoom();
    }

    function applyZoom() {
      galleryImg.style.transform = `scale(${currentScale}) translate(${translateX / currentScale}px, ${translateY / currentScale}px)`;
      document.getElementById('zoom-label').textContent = Math.round(currentScale * 100) + '%';
      galleryMain.style.cursor = isDragging ? 'grabbing' : 'zoom-in';
    }

    // ── 드래그 이동 ──────────────────────────────────────────
    galleryMain.addEventListener('mousedown', (e) => {
      if (currentScale <= 1.0) return;
      isDragging = true;
      dragMoved = false;
      startX = e.clientX - translateX;
      startY = e.clientY - translateY;
      galleryMain.style.cursor = 'grabbing';
      e.preventDefault();
    });
    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - (startX + translateX);
      const dy = e.clientY - (startY + translateY);
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragMoved = true;
      translateX = e.clientX - startX;
      translateY = e.clientY - startY;
      applyZoom();
    });
    window.addEventListener('mouseup', () => {
      if (!isDragging) return;
      isDragging = false;
      galleryMain.style.cursor = 'zoom-in';
    });
    galleryMain.addEventListener('click', (e) => {
      if (dragMoved) { dragMoved = false; return; }
      handleMainClick();
    });

    // ── 휠 이미지 전환 ───────────────────────────────────────
    galleryThumbs.addEventListener('wheel', (e) => {
      e.preventDefault();
      const validIdxs = loadedSrcs.map((s,i) => s ? i : -1).filter(i => i >= 0);
      if (validIdxs.length === 0) return;
      const pos = validIdxs.indexOf(currentIndex);
      if (e.deltaY > 0) selectImage(validIdxs[(pos + 1) % validIdxs.length]);
      else selectImage(validIdxs[(pos - 1 + validIdxs.length) % validIdxs.length]);
    }, { passive: false });

    // ── 스크롤 고정 텍스트 ───────────────────────────────────
    window.addEventListener('scroll', () => {
      if (window.scrollY >= 200) fixedInfo.classList.add('visible');
      else fixedInfo.classList.remove('visible');
    });

    document.addEventListener('keydown', (e) => {
      const validIdxs = loadedSrcs.map((s,i) => s ? i : -1).filter(i => i >= 0);
      if (validIdxs.length === 0) return;
      const pos = validIdxs.indexOf(currentIndex);
      if (e.key === 'ArrowRight') selectImage(validIdxs[(pos + 1) % validIdxs.length]);
      if (e.key === 'ArrowLeft') selectImage(validIdxs[(pos - 1 + validIdxs.length) % validIdxs.length]);
    });
  </script>
</body>
</html>
