<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hand Drill 2 — SujinHan</title>
  <link rel="stylesheet" href="../../style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Coustard:wght@400;900&display=swap" rel="stylesheet"/>
  <style>
    .main { padding-left: 200px !important; padding-right: 200px !important; max-width: 100% !important; padding-top: 100px !important; }
    .page-title { padding-bottom: 10px !important; margin-left: -10px; }
    @media (max-width: 768px) { .main { padding-left: 16px !important; padding-right: 16px !important; } }
    .tools-text { margin-top: 12px; font-family: 'Coustard', serif; font-size: 1.2rem; margin-bottom: 8px; font-weight: 400; letter-spacing: 0.1em; color: #6B7280; margin-left: 5px; }
    .work-icon { display: block; max-width: 25%; height: auto; margin-bottom: 10px; margin-left: 5px; }
    .fixed-info {
      position: fixed;
      left: 48px;
      bottom: 48px;
      z-index: 50;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    .fixed-info.visible { opacity: 1; }
    .fixed-title {
      font-family: 'Coustard', serif;
      font-size: 2.3rem;
      font-weight: 400;
      color: #E8EAF0;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .fixed-date {
      font-family: 'Coustard', serif;
      font-size: 0.9rem;
      font-weight: 400;
      color: #6B7280;
      letter-spacing: 0.1em;
      margin-bottom: 2px;
      padding-left: 10px;
    }
    .fixed-tools {
      font-family: 'Coustard', serif;
      font-size: 1.0rem;
      font-weight: 400;
      color: #ffffff;
      letter-spacing: 0.08em;
      padding-left: 10px;
    }

    /* 인라인 갤러리: 이미지(좌) + 세로 썸네일바(우) */
    .inline-gallery { display: flex; flex-direction: row; align-items: stretch; gap: 16px; margin-top: 10px; }

    .gallery-main {
      position: relative;
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: zoom-in;
      overflow: hidden;
    }
    .gallery-main img {
      max-width: 100%;
      max-height: 82vh;
      object-fit: contain;
      display: block;
      transform-origin: center center;
      transition: transform 0.2s ease;
    }

    /* 도구모음: 이미지 위에 레이어로 겹쳐서 표시 */
    .gallery-controls {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(105,108,100,0.6);
      border: 1px solid #696c64;
      border-radius: 4px;
      padding: 6px 13px;
    }
    .lb-btn { background: none; border: none; color: #ffffff; font-size: 1.1rem; cursor: pointer; padding: 2px 8px; border-radius: 2px; transition: background 0.2s; }
    .lb-btn:hover { background: rgba(78,205,196,0.12); color: #4ECDC4; }
    .zoom-label { font-size: 0.75rem; color: #ffffff; min-width: 40px; text-align: center; font-family: 'Coustard', serif; }

    /* 세로 썸네일바 (현재 이미지가 중앙, 위=이전 / 아래=다음, 무한순환) */
    .gallery-thumbs {
      width: 70px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
      justify-content: center;
    }
    .lb-thumb {
      flex-shrink: 0;
      width: 60px;
      height: 60px;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid transparent;
      border-radius: 2px;
      opacity: 0.5;
      transition: opacity 0.2s, border-color 0.2s, transform 0.2s;
    }
    .lb-thumb:hover { opacity: 0.8; }
    .lb-thumb.active {
      border-color: #ffffff;
      opacity: 1;
      transform: scale(1.15);
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-links">
      <a href="../../index.html" class="nav-btn">Home</a>
      <a href="../../about.html" class="nav-btn">About</a>
    </div>
  </nav>
  <main class="main">
    <section class="page-title works-title">
      <a href="../../index.html" class="back-btn">← Back</a>
      <h1 style="margin-left: -15px;">Hand Drill 2</h1>
      <p class="subtitle" style="margin-left: -5px;">2026.06</p>
      <p class="tools-text" style="padding-left: 40px;">3Ds Max · Zbrush · Rizom UV · Marmoset · Substance Painter · Unreal Engine</p>
      <img src="handdrill2-icon.png" alt="Hand Drill 2 icons" class="work-icon" style="margin-left: 40px; height: 70px; width: auto; margin-bottom: 60px;" onerror="this.style.display='none'"/>
    </section>

    <!-- 고정 텍스트 -->
    <div class="fixed-info" id="fixed-info">
      <p class="fixed-title">Hand Drill 2</p>
      <p class="fixed-date">2026.06</p>
      <p class="fixed-tools">3Ds Max · Zbrush · Rizom UV · Marmoset · Substance Painter · Unreal Engine</p>
    </div>

    <!-- 인라인 갤러리: 메인 이미지(확대/드래그) + 도구모음 + 썸네일바 -->
    <section class="inline-gallery" id="inline-gallery">
      <div class="gallery-main" id="gallery-main">
        <img id="gallery-img" src="" alt=""/>
        <div class="gallery-controls">
          <button class="lb-btn" onclick="zoom(-0.2); event.stopPropagation()">－</button>
          <span class="zoom-label" id="zoom-label">100%</span>
          <button class="lb-btn" onclick="zoom(0.2); event.stopPropagation()">＋</button>
          <button class="lb-btn" onclick="resetZoom(); event.stopPropagation()">↺</button>
        </div>
      </div>

      <div class="gallery-thumbs" id="gallery-thumbs"></div>
    </section>
  </main>
  <footer class="footer">
    <p>© SujinHan. All Rights Reserved.</p>
  </footer>
  <script>
    const imageSrcs = ['work1.jpg','work2.jpg','work3.jpg','work4.jpg','work5.jpg',
                       'work6.jpg','work7.jpg','work8.jpg','work9.jpg','work10.jpg',
                       'work11.jpg','work12.jpg','work13.jpg','work14.jpg','work15.jpg'];
    const loadedSrcs = [];
    let pendingCount = imageSrcs.length;

    const galleryImg = document.getElementById('gallery-img');
    const galleryMain = document.getElementById('gallery-main');
    const galleryThumbs = document.getElementById('gallery-thumbs');

    imageSrcs.forEach((src, idx) => {
      const probe = new Image();
      probe.onload = () => { loadedSrcs[idx] = src; settle(); };
      probe.onerror = () => { settle(); };
      probe.src = src;
    });

    function settle() {
      pendingCount--;
      if (pendingCount === 0) {
        const validIdxs = loadedSrcs.map((s, i) => s ? i : -1).filter(i => i >= 0);
        if (validIdxs.length === 0) return;
        selectImage(validIdxs[0]);
      }
    }

    let currentIndex = 0;
    let currentScale = 1.0;
    let clickCount = 0;

    function selectImage(idx) {
      currentIndex = idx;
      galleryImg.src = loadedSrcs[idx];
      resetZoom();
      updateThumbs();
    }

    // 썸네일바: 현재 이미지가 항상 중앙, 양옆 4개씩, 무한 순환
    function updateThumbs() {
      const validIdxs = loadedSrcs.map((s,i) => s ? i : -1).filter(i => i >= 0);
      const total = validIdxs.length;
      if (total === 0) return;

      const pos = validIdxs.indexOf(currentIndex);
      const visible = 9; // 양옆 4개 + 현재 1개
      const half = Math.floor(visible / 2);

      galleryThumbs.innerHTML = '';
      for (let i = -half; i <= half; i++) {
        const realPos = ((pos + i) % total + total) % total;
        const realIdx = validIdxs[realPos];
        const thumb = document.createElement('img');
        thumb.src = loadedSrcs[realIdx];
        thumb.className = 'lb-thumb' + (i === 0 ? ' active' : '');
        thumb.addEventListener('click', () => selectImage(realIdx));
        galleryThumbs.appendChild(thumb);
      }
    }

    function handleMainClick() {
      if (clickCount === 0) {
        currentScale = 1.5; // 150%
        clickCount = 1;
        applyZoom();
      }
      // 이미 확대된 상태에서 클릭 → 아무 효과 없음
    }

    function zoom(delta) {
      currentScale = Math.min(Math.max(currentScale + delta, 0.4), 3);
      if (currentScale > 1.0) clickCount = 1;
      applyZoom();
    }

    function resetZoom() {
      currentScale = 1.0; // 100% = 안 잘리는 원본 크기
      translateX = 0;
      translateY = 0;
      clickCount = 0;
      applyZoom();
    }

    function applyZoom() {
      galleryImg.style.transform = `scale(${currentScale}) translate(${translateX / currentScale}px, ${translateY / currentScale}px)`;
      document.getElementById('zoom-label').textContent = Math.round(currentScale * 100) + '%';
      galleryMain.style.cursor = currentScale >= 2 ? 'zoom-out' : (isDragging ? 'grabbing' : 'zoom-in');
    }

    // 드래그로 이동 (확대된 상태에서만)
    let isDragging = false, startX, startY, translateX = 0, translateY = 0;

    galleryMain.addEventListener('mousedown', (e) => {
      if (currentScale <= 1.0) return;
      isDragging = true;
      startX = e.clientX - translateX;
      startY = e.clientY - translateY;
      galleryMain.style.cursor = 'grabbing';
      e.preventDefault();
    });
    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      translateX = e.clientX - startX;
      translateY = e.clientY - startY;
      applyZoom();
    });
    window.addEventListener('mouseup', () => {
      if (!isDragging) return;
      isDragging = false;
      galleryMain.style.cursor = currentScale >= 2 ? 'zoom-out' : 'zoom-in';
    });

    // 이미지 박스 클릭시 확대(클릭 1회 = 150%)
    galleryMain.addEventListener('click', (e) => {
      if (isDragging) return;
      handleMainClick();
    });

    // 600px 스크롤하면 고정 텍스트 표시
    const fixedInfo = document.getElementById('fixed-info');
    window.addEventListener('scroll', () => {
      if (window.scrollY >= 400) {
        fixedInfo.classList.add('visible');
      } else {
        fixedInfo.classList.remove('visible');
      }
    });

    document.addEventListener('keydown', (e) => {
      const validIdxs = loadedSrcs.map((s,i) => s ? i : -1).filter(i => i >= 0);
      if (validIdxs.length === 0) return;
      const pos = validIdxs.indexOf(currentIndex);
      if (e.key === 'ArrowRight') selectImage(validIdxs[(pos + 1) % validIdxs.length]);
      if (e.key === 'ArrowLeft') selectImage(validIdxs[(pos - 1 + validIdxs.length) % validIdxs.length]);
    });
  </script>
</body>
</html>
