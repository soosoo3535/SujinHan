<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zbrush Study — SujinHan</title>
  <link rel="stylesheet" href="../../style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <nav class="nav">
    <div class="nav-links">
      <a href="../../index.html" class="nav-btn">Home</a>
      <a href="../../about.html" class="nav-btn">About</a>
    </div>
  </nav>

  <main class="main">

    <section class="page-title works-title">
      <a href="../../index.html" class="back-btn">← Back</a>
      <h1>Zbrush Study</h1>
      <p class="subtitle">2025.11 —</p>
    </section>

    <section class="works-grid" id="works-grid">

      <!-- ★ 이미지 추가 방법 ★
           새 작업물을 맨 위에 추가하려면 아래 블록을 맨 앞에 복붙하세요.
           src에 파일명만 넣으면 돼요. 이름은 자유롭게!
      -->

      <div class="work-item" onclick="openLightbox(this)">
        <img src="ZbrushStudy1-1.jpg" alt="Zbrush Study"/>
      </div>

      <div class="work-item" onclick="openLightbox(this)">
        <img src="ZbrushStudy1-2.jpg" alt="Zbrush Study"/>
      </div>

      <div class="work-item" onclick="openLightbox(this)">
        <img src="ZbrushStudy1-3.jpg" alt="Zbrush Study"/>
      </div>

      <!-- 새 이미지 추가 예시 (맨 앞에 붙여넣기)
      <div class="work-item" onclick="openLightbox(this)">
        <img src="20260615_새작업.jpg" alt="Zbrush Study"/>
      </div>
      -->

    </section>
  </main>

  <!-- 라이트박스 -->
  <div class="lightbox" id="lightbox" onclick="handleLightboxClick(event)">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>

    <!-- 확대/축소 버튼 -->
    <div class="lightbox-controls">
      <button class="lb-btn" onclick="zoom(-0.2)">－</button>
      <span class="zoom-label" id="zoom-label">100%</span>
      <button class="lb-btn" onclick="zoom(0.2)">＋</button>
      <button class="lb-btn" onclick="resetZoom()">↺</button>
    </div>

    <div class="lightbox-img-wrap" id="lb-wrap">
      <img id="lightbox-img" src="" alt=""/>
    </div>
  </div>

  <footer class="footer">
    <p>© 2026 Han Sujin. All rights reserved.</p>
  </footer>

  <script>
    let currentScale = 1;

    function openLightbox(el) {
      const src = el.querySelector('img').src;
      document.getElementById('lightbox-img').src = src;
      currentScale = 1;
      applyZoom();
      document.getElementById('lightbox').classList.add('open');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
    }

    function handleLightboxClick(e) {
      if (e.target === e.currentTarget) closeLightbox();
    }

    function zoom(delta) {
      currentScale = Math.min(Math.max(currentScale + delta, 0.4), 3);
      applyZoom();
    }

    function resetZoom() {
      currentScale = 1;
      applyZoom();
    }

    function applyZoom() {
      const img = document.getElementById('lightbox-img');
      img.style.transform = 'scale(' + currentScale + ')';
      document.getElementById('zoom-label').textContent = Math.round(currentScale * 100) + '%';
    }

    // 마우스 휠로도 확대/축소
    document.getElementById('lb-wrap').addEventListener('wheel', (e) => {
      e.preventDefault();
      zoom(e.deltaY < 0 ? 0.1 : -0.1);
    }, { passive: false });

    // 키보드 ESC로 닫기
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>

</body>
</html>
